apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-agents
  namespace: esg-audit
  labels:
    app: audit-agents
    component: multiagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audit-agents
  template:
    metadata:
      labels:
        app: audit-agents
        component: multiagent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      serviceAccountName: esg-audit-sa
      containers:
        - name: audit-agents
          image: esg-audit/agents:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
              name: http
          envFrom:
            - configMapRef:
                name: esg-audit-config
            - secretRef:
                name: esg-audit-secrets
          env:
            - name: PORT
              value: "8003"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: QDRANT_HOST
              value: "qdrant"
            - name: QDRANT_PORT
              value: "6333"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
      volumes:
        - name: checkpoints
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: audit-agents
  namespace: esg-audit
spec:
  selector:
    app: audit-agents
  ports:
    - port: 8003
      targetPort: 8003
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: audit-agents-hpa
  namespace: esg-audit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: audit-agents
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
