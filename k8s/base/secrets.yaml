apiVersion: v1
kind: Secret
metadata:
  name: esg-audit-secrets
  namespace: esg-audit
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  PRIVACY_ENCRYPTION_KEY: "${PRIVACY_ENCRYPTION_KEY}"
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
  AWS_KMS_KEY_ID: "${AWS_KMS_KEY_ID}"
  ENCRYPTION_KEY: "${PRIVACY_ENCRYPTION_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
  namespace: esg-audit
type: Opaque
stringData:
  redis-password: "${REDIS_PASSWORD:-esg-audit-redis-2024}"
---
apiVersion: v1
kind: Secret
metadata:
  name: qdrant-api-key
  namespace: esg-audit
type: Opaque
stringData:
  api-key: "${QDRANT_API_KEY:-esg-audit-qdrant-key}"
---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry
  namespace: esg-audit
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "${DOCKER_CONFIG_JSON}"
