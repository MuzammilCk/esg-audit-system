apiVersion: v1
kind: ServiceAccount
metadata:
  name: esg-audit-sa
  namespace: esg-audit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: esg-audit-role
  namespace: esg-audit
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: esg-audit-rolebinding
  namespace: esg-audit
subjects:
  - kind: ServiceAccount
    name: esg-audit-sa
    namespace: esg-audit
roleRef:
  kind: Role
  name: esg-audit-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: audit-agents-pdb
  namespace: esg-audit
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: audit-agents
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ray-worker-pdb
  namespace: esg-audit
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ray
      component: worker
